name: Repo Factory - Create Repository

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      template_name:
        description: "テンプレートリポジトリ名"
        required: true
        default: "AEGIS_R_template_20260301"
      _repo_name_hint:
        description: |
          入力不要。リポジトリ名は下記項目をハイフン（-）で連結して自動生成されます。
          AEGIS-ZDEV/ZVAL/PRD-S/M-[molecule]-([study_no]-)[reporting_event_name]
          ※ AEGIS は固定、study_no は Studyタイプのみ必須、Moleculeタイプでは省略されます。
        required: false
        default: "例：AEGIS-PRD-S-RO1234567-STD0001-ReportingEvent1"
      environment:
        description: "環境名、self-hosted Runner のラベルに対応必要"
        required: true
        type: choice
        options:
          - DEV
          - VAL
          - PRD
        default: "DEV"
      repo_type:
        description: "リポジトリタイプ"
        required: true
        type: choice
        options:
          - Study
          - Molecule
        default: "Study"
      molecule:
        description: "Molecule"
        required: true
        default: "RO1234567"
      study_no:
        description: "StudyNo（Studyタイプ必須、Moleculeタイプ不要）"
        required: false
        default: "STD-0001"
      reporting_event_name:
        description: "自由に設定可能、フォルダ名に対応必要"
        required: true
        default: "ReportingEvent-test01"

env:
  OTHERS_BRANCHES: ""

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CREATE_REPO_APP_ID }}
          private-key: ${{ secrets.CREATE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> $GITHUB_ENV

      - name: Configure Target Branches
        run: |
          # ---------------------------------------------------
          # Configuration: Define extra branches here
          # ---------------------------------------------------
          # メインブランチ以外に作成するブランチ（スペース区切り）
          echo "OTHER_BRANCHES=dev qa" >> $GITHUB_ENV

      - name: Validate parameters and construct repository name
        id: validate
        run: |
          # ---------------------------------------------------
          # 1. テンプレートの存在チェック
          # ---------------------------------------------------
          TEMPLATE_NAME="${{ github.event.inputs.template_name }}"
          echo "テンプレートを検証中: $TEMPLATE_NAME"

          STATUS_TPL=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository_owner }}/$TEMPLATE_NAME)

          if [ "$STATUS_TPL" != "200" ]; then
            echo "❌ テンプレートリポジトリ($TEMPLATE_NAME)が見つかりません"
            exit 1
          fi
          echo "✅ テンプレート確認OK"

          # ---------------------------------------------------
          # 2. StudyNoの必須チェック
          # ---------------------------------------------------
          if [ "${{ github.event.inputs.repo_type }}" == "Study" ] && [ -z "${{ github.event.inputs.study_no }}" ]; then
            echo "❌ StudyタイプのリポジトリではStudyNoは必須です"
            exit 1
          fi
          echo "✅ StudyNoチェックOK"

          # ---------------------------------------------------
          # 3. リポジトリ名の組み立てと検証
          # ---------------------------------------------------
          # _repo_name_hintの説明に従い、入力パラメータからリポジトリ名を組み立てる
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          REPO_TYPE="${{ github.event.inputs.repo_type }}"
          MOLECULE="${{ github.event.inputs.molecule }}"
          STUDY_NO="${{ github.event.inputs.study_no }}"
          REPORTING_EVENT_NAME="${{ github.event.inputs.reporting_event_name }}"

          # 第2部：環境
          if [ "$ENVIRONMENT" == "DEV" ]; then
            ENV_PART="ZDEV"
          elif [ "$ENVIRONMENT" == "VAL" ]; then
            ENV_PART="ZVAL"
          else
            ENV_PART="PRD"
          fi

          # 第3部：リポジトリタイプ
          if [ "$REPO_TYPE" == "Study" ]; then
            TYPE_PART="S"
          else
            TYPE_PART="M"
          fi

          # リポジトリ名を組み立てる
          if [ "$REPO_TYPE" == "Study" ]; then
            REPO_NAME="AEGIS-${ENV_PART}-${TYPE_PART}-${MOLECULE}-${STUDY_NO}-${REPORTING_EVENT_NAME}"
          else
            REPO_NAME="AEGIS-${ENV_PART}-${TYPE_PART}-${MOLECULE}-${REPORTING_EVENT_NAME}"
          fi

          echo "リポジトリ名を検証中: $REPO_NAME"

          # ルール 1：文字種チェック（英数字, _, - のみ）
          if ! [[ "$REPO_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ リポジトリ名に使用できない文字が含まれています"
            exit 1
          fi

          # ルール 2：長さ制限 (Githubの推奨に従う、最大100文字とする)
          if [ ${#REPO_NAME} -gt 100 ]; then
            echo "❌ リポジトリ名が長すぎます（>100）"
            exit 1
          fi

          # ルール 3：既存在チェック
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository_owner }}/$REPO_NAME)

          if [ "$STATUS" == "200" ]; then
            echo "❌ リポジトリは既に存在します"
            exit 1
          fi

          echo "✅ リポジトリ名確認OK"
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

      - name: Create repository from template
        run: |
          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.inputs.template_name }}/generate \
            -d @- <<EOF
          {
            "name": "${{ env.REPO_NAME }}",
            "owner": "${{ github.repository_owner }}",
            "private": false
          }
          EOF

      - name: Wait for Repository Creation
        run: |
          TARGET_REPO="${{ github.repository_owner }}/${{ env.REPO_NAME }}"
          echo "Setting up rulesets for $TARGET_REPO"

          MAX_RETRIES=10
          SLEEP_SEC=5

          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i/$MAX_RETRIES: Checking repo and main branch existence..."
            
            # リポジトリのmainブランチ情報を取得して存在確認 (200 OK なら作成完了とみなす)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/$TARGET_REPO/branches/main)
            
            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ リポジトリ作成完了とmainブランチの存在を確認しました。"
              exit 0
            fi
            
            echo "Waiting ${SLEEP_SEC}s..."
            sleep $SLEEP_SEC
          done

          echo "❌ タイムアウト: リポジトリの作成を確認できませんでした。"
          exit 1

      - name: Configure PR Merge Policy (Allow Merge Commits Only)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ env.REPO_NAME }}"
          echo "Configuring PR merge strategies for $OWNER/$REPO_NAME (merge commit only)..."

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$OWNER/$REPO_NAME" \
            -d '{
              "allow_merge_commit": true,
              "allow_squash_merge": false,
              "allow_rebase_merge": false
            }')

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ PR merge strategies configured (only merge commit enabled)."
          else
            echo "❌ Failed to configure PR merge strategies. Status: $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi

      - name: Set Custom Properties (Molecule, StudyNo)
        run: |
          # 変数を設定
          MOLECULE_VALUE="${{ github.event.inputs.molecule_no }}"
          STUDY_NO_VALUE="${{ github.event.inputs.study_no }}"

          # repo_typeが'M'の場合、StudyNoを空文字列に設定
          if [ "${{ github.event.inputs.repo_type }}" == "M" ]; then
            STUDY_NO_VALUE=""
          fi

          # Custom Property 設定 (PATCH /orgs/{org}/properties/values)
          # 注意: 事前にOrganization側で 'Molecule', 'StudyNo' というプロパティが定義されている必要があります

          # APIバージョンヘッダーを追加して curl を実行
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/${{ github.repository_owner }}/properties/values \
            -d @- <<EOF
          {
            "repository_names": [
              "${{ env.REPO_NAME }}"
            ],
            "properties": [
              {
                "property_name": "Molecule",
                "value": "$MOLECULE_VALUE"
              },
              {
                "property_name": "StudyNo",
                "value": "$STUDY_NO_VALUE"
              }
            ]
          }
          EOF

      - name: Grant Admin Permission to Admin Team
        uses: actions/github-script@v7
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            const environment = "${{ github.event.inputs.environment }}".toLowerCase();
            const adminTeamSlug = `aegis-admin-${environment}`;

            try {
              core.info(`Checking for admin team: ${adminTeamSlug}`);
              await github.rest.teams.getByName({
                org: owner,
                team_slug: adminTeamSlug,
              });
              core.info(`✅ Admin team '${adminTeamSlug}' found.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`❌ Admin team '${adminTeamSlug}' not found.`);
              } else {
                core.setFailed(`❌ Error checking for admin team '${adminTeamSlug}': ${error.message}`);
              }
              return;
            }

            try {
              core.info(`Granting 'admin' permission to team: ${adminTeamSlug}`);
              await github.rest.teams.addOrUpdateRepoPermissionsInOrg({
                org: owner,
                team_slug: adminTeamSlug,
                owner: owner,
                repo: repo,
                permission: 'admin',
              });
              core.info(`✅ Successfully granted 'admin' permission to team '${adminTeamSlug}'.`);
            } catch (error) {
              core.setFailed(`❌ Failed to grant 'admin' permission to team '${adminTeamSlug}': ${error.message}`);
            }

      - name: Grant Write Permission to Project Teams
        uses: actions/github-script@v7
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            const repoType = "${{ github.event.inputs.repo_type }}";
            const environment = "${{ github.event.inputs.environment }}".toLowerCase();
            const studyNo = "${{ github.event.inputs.study_no }}".toLowerCase();
            const molecule = "${{ github.event.inputs.molecule }}".toLowerCase();

            let identifier = "";
            if (repoType === "Study") {
              identifier = studyNo;
            } else {
              identifier = molecule;
            }
            const searchPattern = `-${identifier}-${environment}`;
            core.info(`Searching for teams with pattern: '${searchPattern}' to grant 'write' permission.`);

            const matchedTeams = [];
            try {
              for await (const response of github.paginate.iterator(github.rest.teams.list, {
                org: owner,
                per_page: 100,
              })) {
                const teamsOnPage = response.data;
                const matchedOnPage = teamsOnPage.filter(team => team.slug.toLowerCase().includes(searchPattern));
                if (matchedOnPage.length > 0) {
                  matchedTeams.push(...matchedOnPage);
                }
              }
            } catch (error) {
              core.setFailed(`❌ Failed to retrieve teams: ${error.message}`);
              return;
            }

            if (matchedTeams.length === 0) {
              core.setFailed(`❌ No teams found matching the pattern '${searchPattern}'. Please check team naming conventions.`);
              return;
            }

            core.info(`Found matching teams: ${matchedTeams.map(t => t.slug).join(', ')}`);

            for (const team of matchedTeams) {
              try {
                core.info(`Granting 'write' permission to team: ${team.slug}`);
                await github.rest.teams.addOrUpdateRepoPermissionsInOrg({
                  org: owner,
                  team_slug: team.slug,
                  owner: owner,
                  repo: repo,
                  permission: 'push', // 'push' corresponds to 'write' permission
                });
                core.info(`✅ Successfully granted 'write' permission to team '${team.slug}'.`);
              } catch (error) {
                core.setFailed(`❌ Failed to grant 'write' permission to team '${team.slug}': ${error.message}`);
                // The loop will stop here because setFailed terminates the action
              }
            }

      - name: Create Additional Branches
        run: |
          # ---------------------------------------------------
          # 分支作成: dev, qa... (基于main)
          # ---------------------------------------------------
          REPO_NAME="${{ env.REPO_NAME }}"

          # 作業用ディレクトリ
          WORK_DIR="temp_branch_$REPO_NAME"
          mkdir -p $WORK_DIR
          cd $WORK_DIR

          # 新リポジトリをclone (GH_TOKEN使用)
          git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$REPO_NAME.git" .

          # Git用户设定 (统一使用 github-actions[bot])
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Creating additional branches: ${{ env.OTHER_BRANCHES }}"

          for BRANCH in ${{ env.OTHER_BRANCHES }}; do
            echo "Creating branch: $BRANCH"
            git checkout -b $BRANCH
            git push origin $BRANCH
            # Reset to main for next branch creation (base on main)
            git checkout main
          done

          echo "✅ 分支作成完了"

          # 後始末
          cd ..
          rm -rf $WORK_DIR

      - name: Configure Rulesets from File
        run: |
          TARGET_REPO="${{ github.repository_owner }}/${{ env.REPO_NAME }}"

          # ルールセット定義ファイルのディレクトリ
          FACTORY_REPO="${{ github.repository }}" 
          RULES_DIR=".github/rulesets"
          TARGET_BRANCHES="main ${{ env.OTHER_BRANCHES }}"

          echo "Target branches for rulesets: $TARGET_BRANCHES"

          for BRANCH in $TARGET_BRANCHES; do
            FILE="ruleset_${BRANCH}.jsonc"
            echo "---------------------------------------------------"
            echo "Checking ruleset file for branch: $BRANCH ($FILE)"
            
            CONTENT_URL="https://api.github.com/repos/$FACTORY_REPO/contents/$RULES_DIR/$FILE"
            
            # 存在確認
            FILE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" $CONTENT_URL)
            
            if [ "$FILE_STATUS" != "200" ]; then
              echo "ℹ️ No ruleset file found for '$BRANCH' (Status: $FILE_STATUS). Skipping."
              continue
            fi

            echo "✅ Found ruleset file for $BRANCH. Downloading..."
            
            # ダウンロード
            DOWNLOAD_RESP=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" $CONTENT_URL)
              
            if ! echo "$DOWNLOAD_RESP" | grep -q '"content":'; then
               echo "❌ Error: Failed to parse content for $FILE"
               exit 1
            fi
            
            # JSON抽出とデコード (jqを使用)
            echo "$DOWNLOAD_RESP" | jq -r .content | base64 -d > temp_ruleset.json
            
            # コメント削除と整形
            # sedで // 以降を削除。文字列内の // を誤検知するリスクがあるが、
            # 現在の定義ファイルにはURL等が含まれていないため許容する。
            sed 's|//.*||g' temp_ruleset.json > clean_ruleset.json

            echo "Creating ruleset for branch: $BRANCH..."
            
            # 作成実行 (レスポンスボディも取得してエラー詳細を表示)
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$TARGET_REPO/rulesets" \
              -d @clean_ruleset.json)

            # ステータスコードとボディを分離
            HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
              
            if [ "$HTTP_CODE" == "201" ]; then
              echo "✅ Ruleset created for $BRANCH"
            else
              echo "❌ Failed to create ruleset for $BRANCH. Status: $HTTP_CODE"
              echo "⬇️ Error Response Body:"
              echo "$HTTP_BODY" | jq . || echo "$HTTP_BODY"
              # デバッグ用に送信したJSONを表示
              echo "⬇️ Sent JSON Payload (First 20 lines):"
              head -n 20 clean_ruleset.json
              exit 1 
            fi
          done

      - name: Setup Labels (AEGIS)
        run: |
          REPO_NAME="${{ env.REPO_NAME }}"
          echo "Setting up AEGIS labels for $REPO_NAME..."

          # Define Labels
          # AEGIS: release (Red)
          # AEGIS: no-release (Gray) - Use when no release is needed

          LABELS_JSON='[
            {"name": "AEGIS: release", "color": "b60205", "description": "Release"},
            {"name": "AEGIS: no-release", "color": "6f7f88", "description": "No Release"}
          ]'

          echo "$LABELS_JSON" | jq -c '.[]' | while read -r LABEL_DATA; do
            NAME=$(echo "$LABEL_DATA" | jq -r .name)
            echo "Creating label: $NAME"
            
            # POST /repos/{owner}/{repo}/labels
            # Capture output and status
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository_owner }}/${{ env.REPO_NAME }}/labels" \
              -d "$LABEL_DATA")

            HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
            BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" == "201" ]; then
                echo "✅ Created $NAME"
            elif [ "$HTTP_CODE" == "422" ]; then
                echo "⚠️ Label $NAME already exists or validation failed. Body: $BODY"
            else
                echo "❌ Failed to create $NAME. Status: $HTTP_CODE. Body: $BODY"
                exit 1
            fi
          done

          echo "✅ Release labels setup complete."

      - name: Initial Tag v0.0.0
        run: |
          REPO_NAME="${{ env.REPO_NAME }}"
          echo "Creating initial tag v0.0.0 for $REPO_NAME..."

          # 作業用ディレクトリ
          WORK_DIR="temp_tag_$REPO_NAME"
          mkdir -p $WORK_DIR
          cd $WORK_DIR

          # 新リポジトリをclone (GH_TOKEN使用)
          git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$REPO_NAME.git" .

          # Git用户设定
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create Tag
          git tag v0.0.0
          git push origin v0.0.0

          echo "✅ Tag v0.0.0 created and pushed."

          # 後始末
          cd ..
          rm -rf $WORK_DIR
