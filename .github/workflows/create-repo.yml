# ================================================
# 機能概要
# -----------------------------------------------
# このワークフローは、手動実行を契機に入力値を検証し、
# テンプレートから新規リポジトリを作成して初期設定を一括適用します。
#
# 実行条件：
# ・workflow_dispatch（手動実行）時
#
# 主な処理：
# ・GitHub App トークンを生成して権限を取得（Generate App Token）
# ・テンプレートリポジトリの存在確認と、入力値に基づくリポジトリ名の生成・検証
# ・テンプレートから新規リポジトリを作成し、作成完了（mainブランチ利用可能）まで待機
# ・PRマージ方針の設定、カスタムプロパティ設定、管理チーム／プロジェクトチームへの権限付与
# ・mainを起点に追加ブランチ（既定: dev qa）を作成し、対象ブランチごとにルールセットを適用
# ・ルールセット作成時に入力引数に応じて承認人数（レビュー人数）を設定
# ・AEGISラベルを作成し、初期タグ v0.0.0 を作成して push
#
# 重要な分岐：
# ・repo_type が Study の場合のみ study_no を必須とし、リポジトリ名に study_no を含めます（Molecule の場合は除外）。
# ・追加ブランチは main を起点に env.OTHER_BRANCHES（既定: dev qa）を作成し、ルールセット適用対象も main + 追加ブランチで分岐します。
# ・ルールセット定義ファイルが存在しないブランチはスキップし、存在するブランチのみ API で作成します。
# ================================================

name: Repo Factory - Create Repository

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      template_name:
        description: "Template repository name"
        required: true
        default: "AEGIS_R_template_20260301"
      _repo_name_hint:
        description: |
          No input required. The repository name is automatically generated by concatenating the following items with a hyphen (-).
          AEGIS-PRD/VAL/DEV-S/M-[molecule]-([study_no]-)[reporting_event_name]
          * AEGIS is fixed, study_no is required only for Study type, and omitted for Molecule type.
        required: false
        default: "Example: AEGIS-PRD-S-RO1234567-STD0001-ReportingEvent1"
      environment:
        description: "Environment name, must correspond to a self-hosted runner label"
        required: true
        type: choice
        options:
          - PRD
          - VAL
          - DEV
        default: "DEV"
      repo_type:
        description: "Repository type"
        required: true
        type: choice
        options:
          - Study
          - Molecule
        default: "Study"
      molecule:
        description: "Molecule"
        required: true
        default: "RO1234567"
      study_no:
        description: "StudyNo (Required for Study type, not for Molecule type)"
        required: false
        default: "STD-0001"
      reporting_event_name:
        description: "Freely configurable, must correspond to a folder name"
        required: true
        default: "ReportingEvent1"
      reviewer_requirement:
        description: "Reviewer requirement: optional or required"
        required: true
        type: choice
        options:
          - optional
          - required
        default: optional

env:
  DEFAULT_BRANCH: "main"
  # mainブランチに加えて、新しいリポジトリに作成されるブランチ。スペース区切りで複数指定可能。
  OTHER_BRANCHES: "dev qa"

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Show inputs
        run: |
          echo '${{ toJSON(github.event.inputs) }}'

      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CREATE_REPO_CLIENT_ID }}
          private-key: ${{ secrets.CREATE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> $GITHUB_ENV

      - name: Validate parameters and construct repository name
        id: validate
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          # ---------------------------------------------------
          # 1. テンプレートの存在チェック
          # ---------------------------------------------------
          TEMPLATE_NAME="${{ github.event.inputs.template_name }}"
          echo "Validating template: $TEMPLATE_NAME"

          STATUS_TPL=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/${{ github.repository_owner }}/$TEMPLATE_NAME)

          if [ "$STATUS_TPL" == "404" ]; then
            echo "❌ Template repository ($TEMPLATE_NAME) not found."
            exit 1
          elif [ "$STATUS_TPL" != "200" ]; then
            echo "❌ Failed to validate template repository. Status: $STATUS_TPL"
            exit 1
          fi
          echo "✅ Template validation OK."

          # ---------------------------------------------------
          # 2. StudyNoの必須チェック
          # ---------------------------------------------------
          if [ "${{ github.event.inputs.repo_type }}" == "Study" ]; then
            if [ -z "${{ github.event.inputs.study_no }}" ]; then
              echo "❌ StudyNo is required for Study type repositories."
              exit 1
            fi
            echo "✅ StudyNo check OK."
          fi

          # ---------------------------------------------------
          # 3. リポジトリ名の組み立てと検証
          # ---------------------------------------------------
          # _repo_name_hintの説明に従い、入力パラメータからリポジトリ名を組み立てる
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          REPO_TYPE="${{ github.event.inputs.repo_type }}"
          MOLECULE="${{ github.event.inputs.molecule }}"
          STUDY_NO="${{ github.event.inputs.study_no }}"
          REPORTING_EVENT_NAME="${{ github.event.inputs.reporting_event_name }}"

          # 第3部：リポジトリタイプ
          if [ "$REPO_TYPE" == "Study" ]; then
            TYPE_PART="S"
          else
            TYPE_PART="M"
          fi

          # リポジトリ名を組み立てる
          if [ "$REPO_TYPE" == "Study" ]; then
            REPO_NAME="AEGIS-${ENVIRONMENT}-${TYPE_PART}-${MOLECULE}-${STUDY_NO}-${REPORTING_EVENT_NAME}"
          else
            REPO_NAME="AEGIS-${ENVIRONMENT}-${TYPE_PART}-${MOLECULE}-${REPORTING_EVENT_NAME}"
          fi

          echo "Validating repository name: $REPO_NAME"

          # ルール 1：文字種チェック（英数字, _, - のみ）
          if ! [[ "$REPO_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Repository name contains invalid characters."
            exit 1
          fi

          # ルール 2：長さ制限 (Githubの推奨に従う、最大100文字とする)
          if [ ${#REPO_NAME} -gt 100 ]; then
            echo "❌ Repository name is too long (> 100 characters)."
            exit 1
          fi

          # ルール 3：既存在チェック
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/${{ github.repository_owner }}/$REPO_NAME)

          if [ "$STATUS" == "200" ]; then
            echo "❌ Repository already exists."
            exit 1
          elif [ "$STATUS" != "404" ]; then
            echo "❌ Failed to check repository existence. Status: $STATUS"
            exit 1
          fi

          echo "✅ Repository name validation OK."
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

      - name: Create repository from template
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          echo "Attempting to create repository ${{ env.REPO_NAME }} from template ${{ github.event.inputs.template_name }}..."

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.inputs.template_name }}/generate" \
            -d '{
              "name": "${{ env.REPO_NAME }}",
              "owner": "${{ github.repository_owner }}",
              "private": false
            }')

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Repository created successfully."
          else
            echo "❌ Failed to create repository. Status: $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi

      - name: Wait for Repository Creation
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          TARGET_REPO="${{ github.repository_owner }}/${{ env.REPO_NAME }}"
          DEFAULT_BRANCH="${{ env.DEFAULT_BRANCH }}"
          echo "Waiting for repository creation to complete... ($TARGET_REPO)"

          MAX_RETRIES=10
          SLEEP_SEC=5

          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i/$MAX_RETRIES: Checking repo and ${DEFAULT_BRANCH} branch existence..."
            
            # リポジトリのデフォルトブランチ情報を取得して存在確認 (200 OK なら作成完了とみなす)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/$TARGET_REPO/branches/$DEFAULT_BRANCH)
            
            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Repository created and ${DEFAULT_BRANCH} branch found."
              exit 0
            fi
            
            echo "Waiting ${SLEEP_SEC}s..."
            sleep $SLEEP_SEC
          done

          echo "❌ Timeout: Repository creation could not be confirmed."
          exit 1

      - name: Add Repository to Runner Group
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            const environment = "${{ github.event.inputs.environment }}".toLowerCase();

            // 1. environment → RunnerGroup名のマッピング
            const groupNameMap = { dev: "AEGIS-RunnerGroup-DEV", val: "AEGIS-RunnerGroup-VAL", prd: "AEGIS-RunnerGroup" };
            const runnerGroupName = groupNameMap[environment];
            if (!runnerGroupName) {
              core.setFailed(`❌ Unknown environment: ${environment}`);
              return;
            }
            core.info(`Target Runner Group: ${runnerGroupName}`);

            // 2. Manual pagination to list runner groups (aligned with curl implementation)
            let allGroups = [];
            let page = 1;
            const perPage = 100;
            try {
              while (true) {
                const response = await github.request("GET /orgs/{org}/actions/runner-groups", {
                  org: owner,
                  per_page: perPage,
                  page: page,
                  headers: {
                    "X-GitHub-Api-Version": "2026-03-10"
                  }
                });
                
                if (!response.data || !response.data.runner_groups) {
                  core.setFailed(`❌ Unexpected response structure from runner groups API`);
                  return;
                }
                
                const pageGroups = response.data.runner_groups;
                allGroups = allGroups.concat(pageGroups);
                
                if (pageGroups.length < perPage) {
                  break;
                }
                page++;
              }
            } catch (error) {
              core.setFailed(`❌ Failed to list runner groups: [${error.status}] ${error.message}`);
              return;
            }

            core.info(`✅ Runner groups fetched: ${allGroups.length}`);
            const group = allGroups.find(g => g && g.name === runnerGroupName);
            if (!group) {
              const availableGroupNames = allGroups.map(g => g.name).join(", ");
              core.info(`Available runner groups: ${availableGroupNames || "(none)"}`);
              core.setFailed(`❌ Runner Group '${runnerGroupName}' not found in organization '${owner}'.`);
              return;
            }
            core.info(`✅ Runner Group '${runnerGroupName}' found. ID: ${group.id}`);

            // 3. リポジトリのIDを取得
            let repoData;
            try {
              const response = await github.rest.repos.get({
                owner: owner,
                repo: repo,
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              repoData = response.data;
            } catch (error) {
              core.setFailed(`❌ Failed to get repository info for '${repo}': [${error.status}] ${error.message}`);
              return;
            }
            core.info(`✅ Repository '${repo}' found. ID: ${repoData.id}`);

            // 4. リポジトリをRunnerGroupのRepositoryAccessに追加
            core.info(`Adding repository '${repo}' to Runner Group '${runnerGroupName}'...`);
            try {
              await github.request("PUT /orgs/{org}/actions/runner-groups/{runner_group_id}/repositories/{repository_id}", {
                org: owner,
                runner_group_id: group.id,
                repository_id: repoData.id,
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              core.info(`✅ Repository '${repo}' successfully added to Runner Group '${runnerGroupName}'.`);
            } catch (error) {
              core.setFailed(`❌ Failed to add repository to Runner Group '${runnerGroupName}': [${error.status}] ${error.message}`);
            }

      - name: Configure PR Merge Policy (Allow Merge Commits Only)
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ env.REPO_NAME }}"
          echo "Configuring PR merge strategies for $OWNER/$REPO_NAME (merge commit only)..."

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/$OWNER/$REPO_NAME" \
            -d '{
              "allow_merge_commit": true,
              "allow_squash_merge": false,
              "allow_rebase_merge": false
            }')

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ PR merge strategies configured (only merge commit enabled)."
          else
            echo "❌ Failed to configure PR merge strategies. Status: $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi

      - name: Set Custom Properties (Molecule, StudyNo)
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          # 変数を設定
          MOLECULE_VALUE="${{ github.event.inputs.molecule }}"
          STUDY_NO_VALUE="${{ github.event.inputs.study_no }}"

          # repo_typeが'Molecule'の場合、StudyNoを空文字列に設定
          if [ "${{ github.event.inputs.repo_type }}" == "Molecule" ]; then
            STUDY_NO_VALUE=""
          fi

          echo "Setting custom properties for repository: ${{ env.REPO_NAME }}"

          # Prepare JSON payload
          JSON_PAYLOAD=$(cat <<EOF
          {
            "repository_names": ["${{ env.REPO_NAME }}"],
            "properties": [
              {"property_name": "Molecule", "value": "$MOLECULE_VALUE"},
              {"property_name": "StudyNo", "value": "$STUDY_NO_VALUE"}
            ]
          }
          EOF
          )

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/properties/values" \
            -d "$JSON_PAYLOAD")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          # This API returns 204 No Content on success
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Custom properties set successfully."
          else
            echo "❌ Failed to set custom properties. Status: $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi

      - name: Grant Admin Permission to Admin Team
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            const environment = "${{ github.event.inputs.environment }}".toLowerCase();
            const adminTeamSlug = `aegis-${environment}-admin`;

            try {
              core.info(`Checking for admin team: ${adminTeamSlug}`);
              await github.rest.teams.getByName({
                org: owner,
                team_slug: adminTeamSlug,
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              core.info(`✅ Admin team '${adminTeamSlug}' found.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`❌ Admin team '${adminTeamSlug}' not found.`);
              } else {
                core.setFailed(`❌ Error checking for admin team '${adminTeamSlug}': ${error.message}`);
              }
              return;
            }

            try {
              core.info(`Granting 'admin' permission to team: ${adminTeamSlug}`);
              await github.rest.teams.addOrUpdateRepoPermissionsInOrg({
                org: owner,
                team_slug: adminTeamSlug,
                owner: owner,
                repo: repo,
                permission: 'admin',
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              core.info(`✅ Successfully granted 'admin' permission to team '${adminTeamSlug}'.`);
            } catch (error) {
              core.setFailed(`❌ Failed to grant 'admin' permission to team '${adminTeamSlug}': ${error.message}`);
            }

      - name: Grant Write Permission to Project Teams
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            const repoType = "${{ github.event.inputs.repo_type }}";
            const studyNo = "${{ github.event.inputs.study_no }}".toLowerCase();
            const molecule = "${{ github.event.inputs.molecule }}".toLowerCase();
            const environment = "${{ github.event.inputs.environment }}".toLowerCase();
            let projectTeamSlug = `aegis-${environment}-`;
            if (repoType === "Study") {
              projectTeamSlug += `${studyNo}`;
            } else {
              projectTeamSlug += `${molecule}`;
            }

            try {
              core.info(`Checking for project team: ${projectTeamSlug}`);
              await github.rest.teams.getByName({
                org: owner,
                team_slug: projectTeamSlug,
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              core.info(`✅ Project team '${projectTeamSlug}' found.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`❌ Project team '${projectTeamSlug}' not found.`);
              } else {
                core.setFailed(`❌ Error checking for project team '${projectTeamSlug}': ${error.message}`);
              }
              return;
            }

            try {
              core.info(`Granting 'write' permission to team: ${projectTeamSlug}`);
              await github.rest.teams.addOrUpdateRepoPermissionsInOrg({
                org: owner,
                team_slug: projectTeamSlug,
                owner: owner,
                repo: repo,
                permission: 'push', // 'push' corresponds to 'write' permission
                headers: {
                  "X-GitHub-Api-Version": "2026-03-10"
                }
              });
              core.info(`✅ Successfully granted 'write' permission to team '${projectTeamSlug}'.`);
            } catch (error) {
              core.setFailed(`❌ Failed to grant 'write' permission to team '${projectTeamSlug}': ${error.message}`);
            }

      - name: Create Additional Branches
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail
          trap 'echo "❌ Error in Create Additional Branches step (line $LINENO). Check git operations above."' ERR

          # ---------------------------------------------------
          # ブランチ作成: dev, qa... (デフォルトブランチから作成)
          # ---------------------------------------------------
          REPO_NAME="${{ env.REPO_NAME }}"
          DEFAULT_BRANCH="${{ env.DEFAULT_BRANCH }}"

          # 作業用ディレクトリ
          WORK_DIR="temp_branch_$REPO_NAME"
          mkdir -p $WORK_DIR
          cd $WORK_DIR

          # 新しいリポジトリをクローンする (GH_TOKEN を使用)
          git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$REPO_NAME.git" .

          # Gitユーザー設定 (github-actions[bot] を使用する)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Creating additional branches: ${{ env.OTHER_BRANCHES }}"

          for BRANCH in ${{ env.OTHER_BRANCHES }}; do
            echo "Creating branch: $BRANCH"
            git checkout -b $BRANCH
            git push origin $BRANCH
            # Reset to default branch for next branch creation
            git checkout $DEFAULT_BRANCH
          done

          echo "✅ Branch creation complete."

          # 後始末
          cd ..
          rm -rf $WORK_DIR

      - name: Configure Rulesets from File
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          TARGET_REPO="${{ github.repository_owner }}/${{ env.REPO_NAME }}"
          DEFAULT_BRANCH="${{ env.DEFAULT_BRANCH }}"

          # ルールセット定義ファイルのディレクトリ
          FACTORY_REPO="${{ github.repository }}" 
          RULES_DIR=".github/rulesets"
          TARGET_BRANCHES="$DEFAULT_BRANCH ${{ env.OTHER_BRANCHES }}"

          echo "Target branches for rulesets: $TARGET_BRANCHES"

          for BRANCH in $TARGET_BRANCHES; do
            FILE="ruleset_${BRANCH}.jsonc"
            echo "---------------------------------------------------"
            echo "Checking ruleset file for branch: $BRANCH ($FILE)"
            
            CONTENT_URL="https://api.github.com/repos/$FACTORY_REPO/contents/$RULES_DIR/$FILE"
            
            # 存在確認
            FILE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Accept: application/vnd.github+json" $CONTENT_URL)
            
            if [ "$FILE_STATUS" == "404" ]; then
              echo "✅ No ruleset file found for '$BRANCH' (Status: $FILE_STATUS). Skipping."
              continue
            elif [ "$FILE_STATUS" != "200" ]; then
              echo "❌ Failed to check ruleset file for '$BRANCH'. Status: $FILE_STATUS"
              exit 1
            fi

            echo "✅ Found ruleset file for $BRANCH. Downloading..."
            
            # ダウンロード
            DOWNLOAD_RESP=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Accept: application/vnd.github+json" $CONTENT_URL)
              
            if ! echo "$DOWNLOAD_RESP" | grep -q '"content":'; then
               echo "❌ Error: Failed to parse content for $FILE"
               exit 1
            fi
            
            # JSON抽出とデコード (jqを使用)
            echo "$DOWNLOAD_RESP" | jq -r .content | base64 -d > temp_ruleset.json
            
            # コメント削除と整形
            # sedで // 以降を削除。文字列内の // を誤検知するリスクがあるが、
            # 現在の定義ファイルにはURL等が含まれていないため許容する。
            sed 's|//.*||g' temp_ruleset.json > clean_ruleset.json

            # reviewer_requirement に応じて required_approving_review_count を設定
            REVIEWER_REQ="${{ github.event.inputs.reviewer_requirement }}"
            if [ "$REVIEWER_REQ" == "required" ]; then
              jq '(.rules[] | select(.type == "pull_request") | .parameters.required_approving_review_count) = 1' clean_ruleset.json > temp_clean.json && mv temp_clean.json clean_ruleset.json
            fi

            echo "Creating ruleset for branch: $BRANCH..."
            
            # 作成実行 (レスポンスボディも取得してエラー詳細を表示)
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "https://api.github.com/repos/$TARGET_REPO/rulesets" \
              -d @clean_ruleset.json)

            # ステータスコードとボディを分離
            HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
              
            if [ "$HTTP_CODE" == "201" ]; then
              echo "✅ Ruleset created for $BRANCH"
            else
              echo "❌ Failed to create ruleset for $BRANCH. Status: $HTTP_CODE"
              echo "⬇️ Error Response Body:"
              echo "$HTTP_BODY" | jq . || echo "$HTTP_BODY"
              # デバッグ用に送信したJSONを表示
              echo "⬇️ Sent JSON Payload (First 20 lines):"
              head -n 20 clean_ruleset.json
              exit 1 
            fi
          done

      - name: Setup Labels (AEGIS)
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = process.env.REPO_NAME;
            core.info(`Setting up AEGIS labels for ${owner}/${repo}...`);

            const labels = [
              {name: "AEGIS: release", color: "b60205", description: "This PR requires a release"},
              {name: "AEGIS: no-release", color: "cfd3d7", description: "This PR does not require a release"},
              {name: "Risk: Low", color: "e88888", description: ""},
              {name: "Risk: High", color: "e88888", description: ""},
              {name: "Product: SDTMv", color: "7bc88a", description: ""},
              {name: "Product: ADaM", color: "7bc88a", description: ""},
              {name: "Product: TLG", color: "7bc88a", description: ""},
              {name: "QC-Method: DP", color: "7ba8d9", description: ""},
              {name: "QC-Method: CR", color: "7ba8d9", description: ""},
              {name: "QC-Method: IDD", color: "7ba8d9", description: ""},
              {name: "QC-Method: FL", color: "7ba8d9", description: ""},
              {name: "Status: In Progress", color: "f2d574", description: ""},
              {name: "Status: Ready for QC", color: "f2d574", description: ""},
              {name: "Status: QC In Progress", color: "f2d574", description: ""},
              {name: "Status: QC Complete", color: "f2d574", description: ""},
              {name: "Status: Not required", color: "f2d574", description: ""}
            ];

            for (const label of labels) {
              core.info(`Creating label: ${label.name}`);
              try {
                await github.rest.issues.createLabel({
                  owner: owner,
                  repo: repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                  headers: {
                    "X-GitHub-Api-Version": "2026-03-10"
                  }
                });
                core.info(`✅ Created '${label.name}'`);
              } catch (error) {
                if (error.status === 422) {
                  // Handle "already exists" only. Other 422 errors should fail.
                  const message = (error.response?.data?.message || error.message || "").toLowerCase();
                  const alreadyExists = message.includes("already_exists") || message.includes("already exists");
                  if (alreadyExists) {
                    core.warning(`⚠️ Label '${label.name}' already exists. (Status: 422)`);
                  } else {
                    core.setFailed(`❌ Failed to create label '${label.name}': [${error.status}] ${error.message}`);
                    return;
                  }
                } else {
                  core.setFailed(`❌ Failed to create label '${label.name}': [${error.status}] ${error.message}`);
                  return; // Stop execution on failure
                }
              }
            }
            core.info("✅ Labels setup complete.");

      - name: Initial Tag v0.0.0
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail

          REPO_NAME="${{ env.REPO_NAME }}"
          echo "Creating initial tag v0.0.0 for $REPO_NAME..."

          # 作業用ディレクトリ
          WORK_DIR="temp_tag_$REPO_NAME"
          mkdir -p $WORK_DIR
          cd $WORK_DIR

          # 新しいリポジトリをクローンする (GH_TOKEN を使用)
          git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$REPO_NAME.git" .

          # Gitユーザー設定
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # タグ作成
          git tag v0.0.0
          git push origin v0.0.0

          echo "✅ Tag v0.0.0 created and pushed."

          # 後始末
          cd ..
          rm -rf $WORK_DIR
