name: Repo Factory - Delete Repository

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "削除するリポジトリ名"
        required: true
        default: "AEGIS-PRD-S-xxxx-yyyy-zzzz-dev"

jobs:
  delete-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CREATE_REPO_APP_ID }}
          private-key: ${{ secrets.CREATE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> $GITHUB_ENV

      - name: 入力パラメータの検証
        id: validate
        run: |
          REPO_NAME="${{ github.event.inputs.repo_name }}"
          echo "リポジトリを検証中: $REPO_NAME"

          # ルール 1：既存在チェック
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository_owner }}/$REPO_NAME)

          if [ "$STATUS" != "200" ]; then
            echo "❌ リポジトリ($REPO_NAME)が見つかりません"
            exit 1
          fi

          echo "✅ 検証に合格しました"

      - name: リポジトリを削除
        run: |
          REPO_NAME="${{ github.event.inputs.repo_name }}"
          echo "リポジトリを削除します: $REPO_NAME"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/$REPO_NAME")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ リポジトリ ($REPO_NAME) の削除に成功しました。"
          else
            echo "❌ リポジトリの削除に失敗しました。 Status: $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi
